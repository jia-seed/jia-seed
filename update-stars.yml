name: Update Total Stars

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count stars from pinned repos and update README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // dynamically fetch pinned repos via graphql
            const query = `{
              user(login: "${{ github.repository_owner }}") {
                pinnedItems(first: 6, types: REPOSITORY) {
                  nodes {
                    ... on Repository {
                      name
                      owner { login }
                      stargazerCount
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query);
            const pinnedRepos = result.user.pinnedItems.nodes;

            let totalStars = 0;
            for (const repo of pinnedRepos) {
              totalStars += repo.stargazerCount;
              console.log(`${repo.owner.login}/${repo.name}: ${repo.stargazerCount} ⭐`);
            }

            console.log(`\ntotal: ${totalStars} ⭐`);

            let readme = fs.readFileSync('README.md', 'utf8');

            readme = readme.replace(
              /total__stars-\d+-yellow/,
              `total__stars-${totalStars}-yellow`
            );

            fs.writeFileSync('README.md', readme);

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add README.md && git commit -m "update total stars count" && git push)
