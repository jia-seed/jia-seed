name: Update Total Stars

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count stars and update README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            const allRepos = await github.paginate(github.rest.repos.listForUser, {
              username: '${{ github.repository_owner }}',
              type: 'owner',
              per_page: 100,
            });
            
            let totalStars = 0;
            for (const repo of allRepos) {
              totalStars += repo.stargazers_count;
              if (repo.stargazers_count > 0) {
                console.log(`${repo.full_name}: ${repo.stargazers_count}`);
              }
            }
            
            console.log(`total across ${allRepos.length} repos: ${totalStars}`);
            
            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(
              /<!--STARS_START-->[\s\S]*?<!--STARS_END-->/,
              `<!--STARS_START-->\n![Total Stars](https://img.shields.io/badge/total__stars-${totalStars}-orange?style=for-the-badge&logo=github)\n<!--STARS_END-->`
            );
            fs.writeFileSync('README.md', readme);

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add README.md && git commit -m "update total stars count" && git push)
